<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar Twin Dashboard</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Space Grotesk', 'sans-serif'],
              mono: ['IBM Plex Mono', 'monospace']
            },
            boxShadow: {
              panel: '0 20px 50px rgba(12, 27, 43, 0.18)'
            }
          }
        }
      }
    </script>
    <style>
      :root {
        color: #0f1f2e;
        background-color: #ecf7f4;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 15% 10%, rgba(31, 127, 216, 0.24), transparent 42%),
          radial-gradient(circle at 80% 20%, rgba(22, 192, 152, 0.2), transparent 36%),
          linear-gradient(160deg, #f3fbf9 0%, #e5f1fb 55%, #dff6f0 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
